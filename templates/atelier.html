<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vitesse du Vent Marseille — Google AreaChart</title>

    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            margin: 24px;
        }

        #chart {
            width: 100%;
            height: 520px;
        }

        #status {
            margin-top: 12px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <h1>Vitesse du Vent — Marseille (AreaChart)</h1>
    <div id="chart"></div>
    <div id="status"></div>

    <script>
        google.charts.load('current', { packages: ['corechart'] });
        google.charts.setOnLoadCallback(init);

        let cachedRows = null;

        async function init() {
            try {
                const rows = await fetchMarseilleData();
                cachedRows = rows;
                drawChart(rows);

                window.addEventListener('resize', () => {
                    if (cachedRows) drawChart(cachedRows);
                });
            } catch (err) {
                showStatus("Erreur: " + (err?.message || err));
                console.error(err);
            }
        }

        async function fetchMarseilleData() {
            const res = await fetch('/api_atelier', { headers: { 'Accept': 'application/json' } });

            if (!res.ok) {
                throw new Error(`HTTP ${res.status} sur /api_atelier`);
            }

            const json = await res.json();

            // json attendu: [{ datetime: "2026-02-15T00:00", windspeed_kmh: 12.5 }, ...]
            const rows = json.map(p => {
                const dt = toDate(p.datetime);
                const wind = Number(p.windspeed_kmh);
                return [dt, wind];
            });

            // Trier par date
            rows.sort((a, b) => a[0] - b[0]);

            return rows;
        }

        function toDate(isoLike) {
            // "2026-02-15T00:00"
            const [datePart, timePart] = isoLike.split('T');
            const [y, m, d] = datePart.split('-').map(Number);
            const [hh, mm] = timePart.split(':').map(Number);
            return new Date(y, m - 1, d, hh, mm, 0);
        }

        function drawChart(rows) {
            const data = new google.visualization.DataTable();
            data.addColumn('datetime', 'Date/Heure');
            data.addColumn('number', 'Vitesse (km/h)');
            data.addRows(rows);

            const options = {
                title: 'Vitesse du vent à Marseille (horaire)',
                legend: { position: 'bottom' },
                hAxis: {
                    title: 'Date/Heure',
                    format: 'dd/MM HH:mm'
                },
                vAxis: {
                    title: 'km/h',
                    minValue: 0
                },
                explorer: { actions: ['dragToZoom', 'rightClickToReset'] },
                colors: ['#2196F3'],
                areaOpacity: 0.3
            };

            // Utilisation d'un AreaChart pour l'atelier final (différent de LineChart et ColumnChart)
            const chart = new google.visualization.AreaChart(document.getElementById('chart'));
            chart.draw(data, options);

            showStatus(`OK — ${rows.length} points chargés depuis /api_atelier`);
        }

        function showStatus(msg) {
            document.getElementById('status').textContent = msg;
        }
    </script>
</body>

</html>
